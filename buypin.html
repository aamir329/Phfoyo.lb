<!DOCTYPE html>
<html>
<head>
    <title>Buy Pin - PHF Oyo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #2196f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .logo { width: 80px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .back { display: block; margin-top: 15px; color: #757575; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <img src="phf-logo.png" class="logo">
    <h2 style="color:#2196f3">Purchase PIN</h2>
    <form onsubmit="payNow(event)">
        <input id="name" placeholder="Full Name" required>
        <input id="email" placeholder="Email" required>
        <input id="phone" placeholder="Phone (e.g. 23480...)" required>
        <select id="category">
            <option value="10000">Early Bird - ₦10,000</option>
            <option value="12000">Workers - ₦12,000</option>
        </select>
        <button class="btn">PAY NOW</button>
    </form>
    <a href="index.html" class="back">← Back to Home</a>
</div>

<script>
    // INITIALIZE FIREBASE HERE
    firebase.initializeApp({apiKey:"AIzaSyCcGV_sUqfPBrzfHUHAfeWlcP4JKy2gOKY",authDomain:"https://phfoyolb.firebaseapp.com",projectId:"phfoyolb"});
    const db = firebase.firestore();

    function generatePin(){ return "PHF-"+Math.random().toString(36).substr(2,6).toUpperCase(); }

    function payNow(e){
        e.preventDefault();
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let phone = document.getElementById("phone").value;
        let amount = document.getElementById("category").value;

        PaystackPop.setup({
            key:'YOUR_PAYSTACK_KEY',
            email:email,
            amount:amount*100,
            callback:function(res){
                let pin = generatePin();
                db.collection("pins").add({ name, email, phone, amount, pin, used:false, ref:res.reference, date:new Date() });
                generatePDF(name, amount, res.reference, pin);
                alert("Payment Successful! Your PIN is: " + pin);
                window.location.href="register.html?pin="+pin;
            }
        }).openIframe();
    }

    function generatePDF(name,amount,ref,pin){
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape','mm',[85,55]);
        doc.setFontSize(10);
        doc.text("PHF OYO CAMP ID", 10, 10);
        doc.text("Name: " + name, 10, 20);
        doc.text("PIN: " + pin, 10, 30);
        doc.save(`PHF_PIN_${name}.pdf`);
    }
</script>
</body>
</html>
