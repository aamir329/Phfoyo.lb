<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camp Check-In</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.12/minified/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; margin: 0; text-align: center; }
        .header { background: #1a237e; color: white; padding: 20px; margin-bottom: 20px; }
        #reader { width: 320px; margin: auto; border: 5px solid #1a237e; border-radius: 10px; overflow: hidden; }
        #status { margin-top: 25px; font-size: 1.2rem; font-weight: bold; padding: 15px; border-radius: 8px; display: inline-block; }
        .success { color: #2e7d32; background: #e8f5e9; }
        .error { color: #c62828; background: #ffebee; }
        .btn-home { margin-top: 30px; display: inline-block; text-decoration: none; color: #1a237e; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <img src="phf-logo.png" style="width: 50px; vertical-align: middle;">
    <h2 style="display:inline; margin-left: 10px;">Official Check-In</h2>
</div>

<div id="reader"></div>
<div id="status">Ready to Scan QR...</div>

<br>
<a href="index.html" class="btn-home">← Return to Portal</a>

<script>
firebase.initializeApp({apiKey:"AIzaSyCcGV_sUqfPBrzfHUHAfeWlcP4JKy2gOKY",authDomain:"https://phfoyolb.firebaseapp.com",projectId:"phfoyolb"});
const db=firebase.firestore();
const status = document.getElementById("status");

function onScanSuccess(decodedText){
  status.className = "";
  status.innerText = "Checking PIN...";
  
  db.collection("registrations").where("pin","==",decodedText).get().then(snap=>{
    if(snap.empty){
        status.innerText="❌ Invalid PIN!"; 
        status.classList.add("error");
        return;
    }
    const doc=snap.docs[0];
    db.collection("checkins").doc(doc.id).set({
        name: doc.data().name,
        pin: decodedText,
        timestamp: new Date()
    });
    status.innerText=`✅ ${doc.data().name} Checked In!`;
    status.classList.add("success");
  });
}

const html5QrcodeScanner=new Html5QrcodeScanner("reader",{fps:10,qrbox:250},false);
html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
