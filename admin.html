<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - PHF Oyo Camp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.12/minified/html5-qrcode.min.js"></script>
    <style>
        :root { --blue: #1a237e; --red: #d32f2f; --green: #2e7d32; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 10px; border-left: 5px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-box h4 { margin: 0; font-size: 12px; color: #666; text-transform: uppercase; }
        .stat-box p { margin: 5px 0 0; font-size: 20px; font-weight: bold; color: var(--blue); }

        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th { background: var(--blue); color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-male { background: #e3f2fd; color: #1976d2; }
        .badge-female { background: #fce4ec; color: #c2185b; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-export { background: var(--green); color: white; float: right; }
        .btn-scan { background: var(--red); color: white; }
        
        #reader { width: 100%; max-width: 400px; margin: 15px auto; display: none; border: 3px solid var(--blue); border-radius: 10px; }
        #search { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="card" style="max-width:400px; margin: 100px auto; text-align: center;">
        <img src="phf-logo.png" style="width: 60px;">
        <h2>Admin Login</h2>
        <input id="pass" type="password" placeholder="Enter Password" style="width:100%; padding:10px; margin-bottom:15px;">
        <button class="btn btn-scan" style="width:100%" onclick="login()">Enter Dashboard</button>
    </div>
</div>

<div class="container" id="panel" style="display:none">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color:var(--blue); margin:0;">Camp Management</h2>
        <div>
            <button class="btn btn-scan" onclick="toggleScanner()">📷 SCAN ID</button>
            <button class="btn btn-export" onclick="exportData()">📊 EXPORT CSV</button>
        </div>
    </div>

    <div class="stats-grid" id="stats-area">
        </div>

    <div id="reader"></div>

    <div class="card">
        <input id="search" onkeyup="filterTable()" placeholder="🔍 Search Name, PIN, Tag, or House...">
        <div style="overflow-x:auto; max-height: 500px;">
            <table id="regTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Gender</th>
                        <th>Tag No</th>
                        <th>House</th>
                        <th>PIN</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    firebase.initializeApp({apiKey:"AIzaSyCcGV_sUqfPBrzfHUHAfeWlcP4JKy2gOKY",authDomain:"https://phfoyolb.firebaseapp.com",projectId:"phfoyolb"});
    const db = firebase.firestore();
    let scanner = null;

    function login(){
        if(document.getElementById("pass").value === "PHF2026"){
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("panel").style.display = "block";
            loadData();
        } else { alert("Wrong Password"); }
    }

    async function loadData() {
        const snapshot = await db.collection("registrations").orderBy("date", "desc").get();
        let html = "";
        let houseCounts = {};

        snapshot.forEach(doc => {
            const data = doc.data();
            const date = data.date ? data.date.toDate().toLocaleDateString() : 'N/A';
            
            // Track counts for stats
            houseCounts[data.house] = (houseCounts[data.house] || 0) + 1;

            html += `
                <tr>
                    <td><b>${data.name}</b></td>
                    <td><span class="badge ${data.gender === 'Male' ? 'badge-male' : 'badge-female'}">${data.gender}</span></td>
                    <td style="color:var(--blue); font-weight:bold;">${data.tagNumber}</td>
                    <td style="color:var(--red); font-weight:bold;">${data.house}</td>
                    <td><code>${data.pin}</code></td>
                    <td>${date}</td>
                </tr>
            `;
        });

        document.getElementById("tableBody").innerHTML = html;
        updateStats(houseCounts, snapshot.size);
    }

    function updateStats(counts, total) {
        let statsHtml = `<div class="stat-box"><h4>Total Registered</h4><p>${total}</p></div>`;
        const allHouses = [
            "Yaya Sinwar", "Ismail Haniyeh", "Nizar Awadallah", "Husam Badran",
            "Asiya bint Muzahim", "Mary (Maryam)", "Khadija bint Khuwaylid", "Aisha bint Abu Bakr"
        ];

        allHouses.forEach(h => {
            let c = counts[h] || 0;
            let color = c >= 50 ? 'color:red' : '';
            statsHtml += `<div class="stat-box"><h4>${h}</h4><p style="${color}">${c}/50</p></div>`;
        });
        document.getElementById("stats-area").innerHTML = statsHtml;
    }

    function toggleScanner() {
        const r = document.getElementById("reader");
        if(r.style.display === "block") {
            r.style.display = "none";
            scanner.clear();
        } else {
            r.style.display = "block";
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            scanner.render((text) => {
                document.getElementById("search").value = text;
                filterTable();
                r.style.display = "none";
                scanner.clear();
            });
        }
    }

    function filterTable() {
        let val = document.getElementById("search").value.toUpperCase();
        let rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let row of rows) {
            row.style.display = row.innerText.toUpperCase().includes(val) ? "" : "none";
        }
    }

    function exportData() {
        let rows = [["Name", "Gender", "Tag No", "House", "PIN", "Date"]];
        let tableRows = document.getElementById("regTable").rows;
        for(let i=1; i<tableRows.length; i++) {
            let cols = [...tableRows[i].cells].map(c => c.innerText);
            rows.push(cols);
        }
        let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
        let link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "PHF_Camp_Registrations.csv");
        link.click();
    }
</script>
</body>
</html>
