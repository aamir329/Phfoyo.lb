<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - PHF Oyo Camp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --blue: #1a237e; --red: #d32f2f; --green: #2e7d32; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 12px; border-radius: 10px; border-left: 5px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-box h4 { margin: 0; font-size: 11px; color: #666; text-transform: uppercase; }
        .stat-box p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: var(--blue); }

        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th { background: var(--blue); color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-scan { background: var(--red); color: white; }
        .btn-export { background: var(--green); color: white; }

        /* Scanner Overlay */
        #camera-ui { display: none; background: #000; padding: 15px; border-radius: 12px; text-align: center; color: white; margin-bottom: 20px; }
        #video { width: 100%; max-width: 400px; border-radius: 8px; border: 2px solid white; }
        .focus-box { border: 2px dashed yellow; height: 60px; width: 80%; margin: -100px auto 40px; position: relative; pointer-events: none; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="card" style="max-width:400px; margin: 100px auto; text-align: center;">
        <h2>Admin Login</h2>
        <input id="pass" type="password" placeholder="Enter Password" style="width:100%; padding:10px; margin-bottom:15px;">
        <button class="btn btn-scan" style="width:100%" onclick="login()">Enter Dashboard</button>
    </div>
</div>

<div class="container" id="panel" style="display:none">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color:var(--blue); margin:0;">Admin Control</h2>
        <div>
            <button class="btn btn-scan" onclick="startCamera()">📷 SCAN ID TO CLEAR</button>
            <button class="btn btn-export" onclick="exportData()">📊 EXPORT</button>
        </div>
    </div>

    <div id="camera-ui">
        <video id="video" playsinline></video>
        <div class="focus-box"></div>
        <p id="status">Point camera at the PIN on the ID Card</p>
        <button class="btn btn-scan" onclick="captureText()">READ & DELETE</button>
        <button class="btn" onclick="stopCamera()" style="background:#555; color:white;">CANCEL</button>
    </div>

    <div class="stats-grid" id="stats-area"></div>

    <div class="card">
        <input id="search" onkeyup="filterTable()" placeholder="🔍 Search Name or PIN..." style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; margin-bottom:10px;">
        <div style="overflow-x:auto; max-height: 500px;">
            <table id="regTable">
                <thead>
                    <tr><th>Name</th><th>House</th><th>PIN</th><th>Tag</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    firebase.initializeApp({apiKey:"AIzaSyCcGV_sUqfPBrzfHUHAfeWlcP4JKy2gOKY",authDomain:"https://phfoyolb.firebaseapp.com",projectId:"phfoyolb"});
    const db = firebase.firestore();
    let stream = null;

    function login(){
        if(document.getElementById("pass").value === "PHF2026"){
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("panel").style.display = "block";
            loadData();
        } else { alert("Wrong Password"); }
    }

    async function loadData() {
        const snapshot = await db.collection("registrations").orderBy("date", "desc").get();
        let html = "";
        let houseCounts = {};
        snapshot.forEach(doc => {
            const data = doc.data();
            houseCounts[data.house] = (houseCounts[data.house] || 0) + 1;
            html += `<tr><td><b>${data.name}</b></td><td>${data.house}</td><td><code>${data.pin}</code></td><td>${data.tagNumber}</td></tr>`;
        });
        document.getElementById("tableBody").innerHTML = html;
        updateStats(houseCounts, snapshot.size);
    }

    function updateStats(counts, total) {
        let statsHtml = `<div class="stat-box"><h4>Total</h4><p>${total}</p></div>`;
        const houses = ["Yaya Sinwar", "Ismail Haniyeh", "Nizar Awadallah", "Husam Badran", "Asiya bint Muzahim", "Mary (Maryam)", "Khadija bint Khuwaylid", "Aisha bint Abu Bakr"];
        houses.forEach(h => {
            statsHtml += `<div class="stat-box"><h4>${h.split(' ')[0]}</h4><p>${counts[h] || 0}/50</p></div>`;
        });
        document.getElementById("stats-area").innerHTML = statsHtml;
    }

    // --- SCANNER LOGIC ---
    async function startCamera() {
        document.getElementById("camera-ui").style.display = "block";
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById("video").srcObject = stream;
        document.getElementById("video").play();
    }

    function stopCamera() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById("camera-ui").style.display = "none";
    }

    async function captureText() {
        const video = document.getElementById("video");
        const status = document.getElementById("status");
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);

        status.innerText = "🔍 Reading text... Please wait...";
        
        try {
            const result = await Tesseract.recognize(canvas.toDataURL(), 'eng');
            // Look for PHF-XXXXXX format
            const match = result.data.text.match(/PHF-[A-Z0-9]{6}/);
            
            if(match) {
                const pin = match[0];
                status.innerText = "Found PIN: " + pin;
                deleteRegistration(pin);
            } else {
                status.innerText = "❌ PIN not detected. Hold steady and try again.";
            }
        } catch (err) {
            status.innerText = "Error reading card.";
        }
    }

    // --- THE DELETE LOGIC ---
    async function deleteRegistration(scannedPin) {
        if(!confirm("Are you sure you want to DELETE registration for PIN: " + scannedPin + "?\n\nThis will allow the user to register again.")) return;

        try {
            const batch = db.batch();

            // 1. Delete the entry from 'registrations'
            const regQuery = await db.collection("registrations").where("pin", "==", scannedPin).get();
            if(regQuery.empty) {
                alert("No registration found for this PIN.");
                return;
            }
            regQuery.forEach(doc => batch.delete(doc.ref));

            // 2. Set the PIN back to 'used: false' in the 'pins' collection
            const pinQuery = await db.collection("pins").where("pin", "==", scannedPin).get();
            pinQuery.forEach(doc => batch.update(doc.ref, { used: false }));

            await batch.commit();
            alert("Registration cleared successfully!");
            stopCamera();
            loadData(); // Refresh table
        } catch (error) {
            alert("Error: " + error.message);
        }
    }

    function filterTable() {
        let val = document.getElementById("search").value.toUpperCase();
        let rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let row of rows) {
            row.style.display = row.innerText.toUpperCase().includes(val) ? "" : "none";
        }
    }

    function exportData() {
        let rows = [["Name", "House", "PIN", "Tag"]];
        let tableRows = document.getElementById("regTable").rows;
        for(let i=1; i<tableRows.length; i++) {
            let cols = [...tableRows[i].cells].map(c => c.innerText);
            rows.push(cols);
        }
        let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
        let link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "PHF_Registrations.csv");
        link.click();
    }
</script>
</body>
</html>
